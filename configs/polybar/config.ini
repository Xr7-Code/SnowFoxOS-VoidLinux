;; SnowFoxOS v3 — Polybar Config
;; Tokyo Night Farben, minimalistisch

[colors]
bg         = #0f0f0f
bg2        = #1a1a1a
fg         = #e8e8e8
fg-dim     = #3a3a3a
accent     = #9B59B6
orange     = #E67E22
gray       = #3a3a3a
inactive   = #2a2a2a
transparent = #00000000

;; ─────────────────────────────────────────────
[bar/snowfox]
monitor               = ${env:MONITOR:}
width                 = 100%
height                = 28
offset-x              = 0
offset-y              = 0
radius                = 0
fixed-center          = true

background            = ${colors.bg}
foreground            = ${colors.fg}

line-size             = 2
line-color            = ${colors.accent}

border-size           = 0
padding-left          = 2
padding-right         = 2
module-margin-left    = 1
module-margin-right   = 1

font-0                = "Noto Sans:size=10;2"
font-1                = "Font Awesome 6 Free:style=Solid:size=10;2"
font-2                = "Font Awesome 6 Free:style=Regular:size=10;2"
font-3                = "Font Awesome 6 Brands:size=10;2"
font-4                = "Noto Color Emoji:size=10;2"

modules-left          = i3 xwindow
modules-center        = date
modules-right         = audio cpu memory battery network tray

separator             = ""
dim-value             = 1.0

tray-position         = right
tray-padding          = 4
tray-background       = ${colors.bg}

wm-restack            = i3
override-redirect     = false

cursor-click          = pointer
cursor-scroll         = ns-resize

enable-ipc            = true

;; ─────────────────────────────────────────────
[module/i3]
type                  = internal/i3
format                = <label-state> <label-mode>
index-sort            = true
wrapping-scroll       = false
strip-wsnumbers       = true
pin-workspaces        = true

label-focused         = %name%
label-focused-background = ${colors.bg2}
label-focused-foreground = ${colors.accent}
label-focused-underline  = ${colors.accent}
label-focused-padding    = 3

label-unfocused       = %name%
label-unfocused-foreground = ${colors.fg-dim}
label-unfocused-padding    = 3

label-urgent          = %name%
label-urgent-foreground = ${colors.orange}
label-urgent-padding    = 3

label-visible         = %name%
label-visible-foreground = ${colors.fg-dim}
label-visible-padding    = 3

label-mode            = %mode%
label-mode-background = ${colors.yellow}
label-mode-foreground = ${colors.bg}
label-mode-padding    = 3

;; ─────────────────────────────────────────────
[module/xwindow]
type                  = internal/xwindow
label                 = %title:0:40:...%
label-foreground      = ${colors.fg-dim}
format-padding        = 2

;; ─────────────────────────────────────────────
[module/date]
type                  = internal/date
interval              = 5
date                  = %a %d.%m.%Y
time                  = %H:%M
label                 =  %date%   %time%
label-foreground      = ${colors.accent}
label-font            = 1

;; ─────────────────────────────────────────────
[module/cpu]
type                  = internal/cpu
interval              = 2
format-prefix         = " "
format-prefix-foreground = ${colors.cyan}
label                 = %percentage:2%%
label-foreground      = ${colors.fg}

;; ─────────────────────────────────────────────
[module/memory]
type                  = internal/memory
interval              = 5
format-prefix         = " "
format-prefix-foreground = ${colors.purple}
label                 = %used%
label-foreground      = ${colors.fg}

;; ─────────────────────────────────────────────
[module/battery]
type                  = internal/battery
battery               = BAT0
adapter               = AC
full-at               = 98
poll-interval         = 10

format-charging       = <animation-charging> <label-charging>
format-discharging    = <ramp-capacity> <label-discharging>
format-full           = <label-full>
format-full-prefix    = " "
format-full-prefix-foreground = ${colors.green}

label-charging        = %percentage%%
label-discharging     = %percentage%%
label-full            = Voll
label-full-foreground = ${colors.green}

ramp-capacity-0       = 
ramp-capacity-1       = 
ramp-capacity-2       = 
ramp-capacity-3       = 
ramp-capacity-4       = 
ramp-capacity-foreground = ${colors.orange}

animation-charging-0  = 
animation-charging-1  = 
animation-charging-2  = 
animation-charging-3  = 
animation-charging-4  = 
animation-charging-foreground = ${colors.accent}
animation-charging-framerate  = 750

format-discharging-underline =
ramp-capacity-0-foreground = ${colors.orange}
ramp-capacity-1-foreground = ${colors.orange}

;; ─────────────────────────────────────────────
[module/network]
type                  = internal/network
interface-type        = wireless
interval              = 5

format-connected      = <ramp-signal> <label-connected>
format-disconnected   = <label-disconnected>

label-connected       = %essid%
label-connected-foreground = ${colors.fg}
label-disconnected    = offline
label-disconnected-foreground = ${colors.red}

ramp-signal-0         = 
ramp-signal-1         = 
ramp-signal-2         = 
ramp-signal-3         = 
ramp-signal-4         = 
ramp-signal-foreground = ${colors.green}

;; ─────────────────────────────────────────────
[module/audio]
type                  = internal/pulseaudio
use-ui-max            = true
interval              = 5

format-volume         = <ramp-volume> <label-volume>
label-volume          = %percentage%%
label-volume-foreground = ${colors.fg}

format-muted-prefix   = " "
format-muted-prefix-foreground = ${colors.fg-dim}
label-muted           = muted
label-muted-foreground = ${colors.fg-dim}

ramp-volume-0         = 
ramp-volume-1         = 
ramp-volume-2         = 
ramp-volume-foreground = ${colors.cyan}

click-right           = pactl set-sink-mute @DEFAULT_SINK@ toggle

;; ─────────────────────────────────────────────
[module/tray]
type                  = internal/tray
tray-spacing          = 4px
